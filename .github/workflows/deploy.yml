name: Deploy

# Build a Docker image, push it to GitHub Container Registry (GHCR), then SSH into the
# VPS and roll it out with docker compose. See README ("CI/CD") for the required secrets
# and the one-time VPS setup.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref
        id: meta
        # GHCR requires a lowercase repository path.
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${repo}:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${repo}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.yml,docker-compose.prod.yml
          target: ${{ secrets.VPS_APP_DIR || '~/app' }}

      - name: Roll out on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR || '~/app' }}"
            export APP_IMAGE="${{ needs.build-and-push.outputs.image }}"
            files="-f docker-compose.prod.yml"
            [ -f docker-compose.yml ] && files="-f docker-compose.yml $files"
            docker compose $files pull
            docker compose $files up -d
            docker image prune -f
